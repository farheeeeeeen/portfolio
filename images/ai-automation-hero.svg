<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root {
        --teal: #0F6E56;
        --teal-light: #E1F5EE;
        --coral: #993C1D;
        --ink: #15141A;
        --muted: #5F5E66;
        --faint: #9C9BA3;
        --hair: #E7E6E1;
      }
      .header { font: 700 32px Geist, system-ui; fill: var(--ink); }
      .subheader { font: 14px Geist, system-ui; fill: var(--muted); }
      .tool-box { stroke: var(--faint); stroke-width: 2; }
      .tool-title { font: 600 13px Geist, system-ui; fill: var(--ink); }
      .tool-label { font: 11px Geist, system-ui; fill: var(--muted); }
      .problem-line { stroke: var(--coral); stroke-width: 1.5; stroke-dasharray: 3,3; }
      .problem-text { font: 12px Geist, system-ui; fill: var(--coral); font-weight: 500; }
      .team-box { fill: var(--teal-light); stroke: var(--teal); stroke-width: 2; }
      .frustrated { fill: var(--ink); font-size: 14px; font-weight: 600; }
    </style>
  </defs>
  
  <rect width="1200" height="720" fill="white"/>
  
  <text x="60" y="50" class="header">The Problem</text>
  <text x="60" y="72" class="subheader">Five data sources, no unified view. Every content decision is slow.</text>
  
  <rect x="460" y="240" width="280" height="140" class="team-box" rx="8"/>
  <text x="600" y="270" class="frustrated" text-anchor="middle">Content Team</text>
  <text x="600" y="300" class="tool-label" text-anchor="middle">No unified visibility into</text>
  <text x="600" y="320" class="tool-label" text-anchor="middle">what's written, how it</text>
  <text x="600" y="340" class="tool-label" text-anchor="middle">performs, or what to</text>
  <text x="600" y="360" class="tool-label" text-anchor="middle">write next</text>
  
  <rect x="60" y="80" width="140" height="100" class="tool-box" fill="white" rx="6"/>
  <text x="130" y="105" class="tool-title" text-anchor="middle">Search Console</text>
  <text x="130" y="125" class="tool-label" text-anchor="middle" font-size="10">Clicks</text>
  <text x="130" y="140" class="tool-label" text-anchor="middle" font-size="10">Impressions</text>
  <text x="130" y="155" class="tool-label" text-anchor="middle" font-size="10">Rankings</text>
  
  <rect x="1000" y="80" width="140" height="100" class="tool-box" fill="white" rx="6"/>
  <text x="1070" y="105" class="tool-title" text-anchor="middle">Plausible</text>
  <text x="1070" y="125" class="tool-label" text-anchor="middle" font-size="10">Page views</text>
  <text x="1070" y="140" class="tool-label" text-anchor="middle" font-size="10">Events</text>
  <text x="1070" y="155" class="tool-label" text-anchor="middle" font-size="10">Sessions</text>
  
  <rect x="40" y="340" width="140" height="100" class="tool-box" fill="white" rx="6"/>
  <text x="110" y="365" class="tool-title" text-anchor="middle">Semrush</text>
  <text x="110" y="385" class="tool-label" text-anchor="middle" font-size="10">Keyword volume</text>
  <text x="110" y="400" class="tool-label" text-anchor="middle" font-size="10">Competitor gaps</text>
  <text x="110" y="415" class="tool-label" text-anchor="middle" font-size="10">Difficulty</text>
  
  <rect x="240" y="480" width="140" height="100" class="tool-box" fill="white" rx="6"/>
  <text x="310" y="505" class="tool-title" text-anchor="middle">HubSpot</text>
  <text x="310" y="525" class="tool-label" text-anchor="middle" font-size="10">Leads</text>
  <text x="310" y="540" class="tool-label" text-anchor="middle" font-size="10">Conversions</text>
  <text x="310" y="555" class="tool-label" text-anchor="middle" font-size="10">Attribution</text>
  
  <rect x="1020" y="440" width="140" height="100" class="tool-box" fill="white" rx="6"/>
  <text x="1090" y="465" class="tool-title" text-anchor="middle">Webflow</text>
  <text x="1090" y="485" class="tool-label" text-anchor="middle" font-size="10">Published posts</text>
  <text x="1090" y="500" class="tool-label" text-anchor="middle" font-size="10">Categories</text>
  <text x="1090" y="515" class="tool-label" text-anchor="middle" font-size="10">Metadata</text>
  
  <line x1="130" y1="180" x2="420" y2="270" class="problem-line"/>
  <line x1="1070" y1="180" x2="740" y2="270" class="problem-line"/>
  <line x1="110" y1="340" x2="420" y2="300" class="problem-line"/>
  <line x1="310" y1="480" x2="480" y2="380" class="problem-line"/>
  <line x1="1090" y1="440" x2="740" y2="380" class="problem-line"/>
  
  <g>
    <text x="60" y="640" class="subheader" font-weight="600">The Cost:</text>
    
    <rect x="60" y="660" width="200" height="40" fill="white" stroke="#993C1D" stroke-width="1" rx="4"/>
    <text x="160" y="683" class="problem-text" text-anchor="middle">Planning stalls</text>
    <text x="160" y="698" class="problem-text" text-anchor="middle" font-size="11">on basic inventory</text>
    
    <rect x="280" y="660" width="200" height="40" fill="white" stroke="#993C1D" stroke-width="1" rx="4"/>
    <text x="380" y="683" class="problem-text" text-anchor="middle">Performance analysis</text>
    <text x="380" y="698" class="problem-text" text-anchor="middle" font-size="11">takes hours</text>
    
    <rect x="500" y="660" width="200" height="40" fill="white" stroke="#993C1D" stroke-width="1" rx="4"/>
    <text x="600" y="683" class="problem-text" text-anchor="middle">No lead attribution</text>
    <text x="600" y="698" class="problem-text" text-anchor="middle" font-size="11">visibility</text>
    
    <rect x="720" y="660" width="200" height="40" fill="white" stroke="#993C1D" stroke-width="1" rx="4"/>
    <text x="820" y="683" class="problem-text" text-anchor="middle">Opportunities surface</text>
    <text x="820" y="698" class="problem-text" text-anchor="middle" font-size="11">months late</text>
    
    <rect x="940" y="660" width="200" height="40" fill="white" stroke="#993C1D" stroke-width="1" rx="4"/>
    <text x="1040" y="683" class="problem-text" text-anchor="middle">Every decision</text>
    <text x="1040" y="698" class="problem-text" text-anchor="middle" font-size="11">is slow</text>
  </g>
</svg>